<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Too Many Lists</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200..900;1,9..144,200..900&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply track preference before first paint so:
      //  - URL `?track=<t>` from a scanned QR / shared link wins, sticks to
      //    localStorage, and is stripped from the address bar
      //  - otherwise localStorage wins
      //  - otherwise 'systems'
      // Whichever wins, set data-track so the palette is correct on frame 1.
      try {
        var u = new URL(location.href);
        var fromUrl = u.searchParams.get('track');
        var t;
        if (fromUrl === 'systems' || fromUrl === 'dynamic' || fromUrl === 'beginner') {
          t = fromUrl;
          localStorage.setItem('tml-track', t);
          u.searchParams.delete('track');
          history.replaceState({}, '', u.toString());
        } else {
          t = localStorage.getItem('tml-track');
          if (t !== 'systems' && t !== 'dynamic' && t !== 'beginner') t = 'systems';
        }
        document.documentElement.dataset.track = t;
      } catch (_) {
        document.documentElement.dataset.track = 'systems';
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
